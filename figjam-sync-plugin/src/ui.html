<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sizzle Story Sync</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        color: #1f1f1f;
        margin: 0;
        padding: 16px;
        background: #ffffff;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 12px 0;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      p.help {
        color: #555;
        margin: 0 0 14px 0;
        line-height: 1.4;
      }
      label {
        display: block;
        font-size: 11px;
        color: #555;
        margin: 10px 0 4px 0;
      }
      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #d0d0d0;
        border-radius: 4px;
        font: inherit;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      button {
        flex: 1;
        padding: 8px 10px;
        border-radius: 4px;
        border: 1px solid #1f1f1f;
        background: #1f1f1f;
        color: #ffffff;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
      }
      button.secondary {
        background: #ffffff;
        color: #1f1f1f;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-top: 14px;
        min-height: 32px;
        padding: 8px 10px;
        border-radius: 4px;
        background: #f4f4f4;
        color: #333;
        font-size: 11px;
        white-space: pre-wrap;
      }
      #status.error {
        background: #fde7e7;
        color: #8a1f1f;
      }
      #status.ok {
        background: #e7f3eb;
        color: #1f5d2a;
      }
    </style>
  </head>
  <body>
    <h1>Sizzle Story Sync</h1>
    <p class="help">
      Loads the current sizzle story graph from the local figjam-sync server and lays it out on this board.
      Start the server with <code>npm run figjam-sync</code> in <code>twine-mcp-server/</code>.
    </p>

    <label for="endpoint">Server endpoint</label>
    <input id="endpoint" type="text" value="http://localhost:4747" />

    <div class="row">
      <button id="load">Load story</button>
      <button id="export" class="secondary">Export board</button>
    </div>

    <div id="status">Idle.</div>

    <script>
      const endpoint = document.getElementById("endpoint");
      const loadBtn = document.getElementById("load");
      const exportBtn = document.getElementById("export");
      const status = document.getElementById("status");

      function setStatus(text, kind) {
        status.textContent = text;
        status.className = kind || "";
      }

      loadBtn.addEventListener("click", async () => {
        const base = endpoint.value.replace(/\/+$/, "");
        setStatus("Fetching " + base + "/story-graph.json …");
        loadBtn.disabled = true;
        try {
          const response = await fetch(base + "/story-graph.json");
          if (!response.ok) {
            throw new Error("HTTP " + response.status + " " + response.statusText);
          }
          const graph = await response.json();
          setStatus(
            "Got " + graph.passages.length + " passages / " + graph.edges.length + " edges. Laying out …",
          );
          parent.postMessage({ pluginMessage: { type: "load-graph", graph } }, "*");
        } catch (err) {
          setStatus("Load failed: " + (err && err.message ? err.message : String(err)), "error");
          loadBtn.disabled = false;
        }
      });

      exportBtn.addEventListener("click", () => {
        setStatus("Walking board …");
        exportBtn.disabled = true;
        parent.postMessage({ pluginMessage: { type: "request-export" } }, "*");
      });

      window.addEventListener("message", async (event) => {
        const message = event.data && event.data.pluginMessage;
        if (!message) return;

        if (message.type === "load-complete") {
          setStatus("Loaded " + message.count + " passages. Pan / zoom to fit.", "ok");
          loadBtn.disabled = false;
          return;
        }

        if (message.type === "export-ready") {
          const base = endpoint.value.replace(/\/+$/, "");
          const board = message.board;
          setStatus(
            "Walked: " +
              board.passages.length + " passages, " +
              board.conceptStickies.length + " concept stickies, " +
              board.edges.length + " edges, " +
              board.conceptEdges.length + " concept edges. POSTing …",
          );
          try {
            const response = await fetch(base + "/board.json", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(board),
            });
            if (!response.ok) {
              throw new Error("HTTP " + response.status + " " + response.statusText);
            }
            const result = await response.json();
            setStatus(
              "Exported " + (result.savedAs || "board") + " (also as " + (result.latest || "board-latest.json") + ").",
              "ok",
            );
          } catch (err) {
            setStatus("Export POST failed: " + (err && err.message ? err.message : String(err)), "error");
          } finally {
            exportBtn.disabled = false;
          }
          return;
        }

        if (message.type === "error") {
          setStatus("Plugin error: " + message.message, "error");
          loadBtn.disabled = false;
          exportBtn.disabled = false;
          return;
        }
      });
    </script>
  </body>
</html>
